<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Monitoramento SSE</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #04d361; }
        .dashboard {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #202024;
            border: 1px solid #323238;
            border-radius: 8px;
            padding: 20px;
            width: 150px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .value {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
            color: #8257e5;
        }
        .status {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #7c7c8a;
        }
    </style>
</head>
<body>

    <h1>Server Metrics Dashboard</h1>
    <p>Dados atualizados em tempo real via Server-Sent Events (SSE)</p>

    <div class="dashboard">
        <div class="card">
            <div>Uso de CPU</div>
            <div class="value" id="cpu">--%</div>
        </div>
        <div class="card">
            <div>Uso de RAM</div>
            <div class="value" id="ram">--%</div>
        </div>
        <div class="card">
            <div>Uptime (S)</div>
            <div class="value" id="uptime">--</div>
        </div>
    </div>

    <div class="status" id="status">Conectando ao servidor...</div>

    <script>
        // Inicializa a conexão SSE com o endpoint do backend
        const eventSource = new EventSource('/events');

        const cpuEl = document.getElementById('cpu');
        const ramEl = document.getElementById('ram');
        const uptimeEl = document.getElementById('uptime');
        const statusEl = document.getElementById('status');

        // Escuta mensagens vindas do servidor
        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            cpuEl.innerText = `${data.cpu}%`;
            ramEl.innerText = `${data.ram}%`;
            uptimeEl.innerText = data.uptime;
        };

        // Tratamento de status da conexão
        eventSource.onopen = () => {
            statusEl.innerText = "🟢 Conectado ao servidor";
            statusEl.style.color = "#04d361";
        };

        eventSource.onerror = () => {
            statusEl.innerText = "🔴 Conexão perdida. Tentando reconectar...";
            statusEl.style.color = "#f75a68";
            cpuEl.innerText = "--%";
            ramEl.innerText = "--%";
        };
    </script>
</body>
</html>
